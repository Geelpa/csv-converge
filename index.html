<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Unificador Comercial</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
</head>

<body class="bg-gray-100 min-h-screen p-8">

    <div class="max-w-5xl mx-auto bg-white rounded-3xl shadow-xl p-8">

        <h1 class="text-3xl font-bold mb-2">
            Unificador de Relatórios Comerciais
        </h1>

        <p class="text-gray-600 mb-8">
            Faça upload das duas planilhas para consolidar automaticamente os dados.
        </p>

        <div class="grid md:grid-cols-2 gap-6 mb-8">

            <div class="border-2 border-dashed rounded-2xl p-6 bg-gray-50">

                <h2 class="text-xl font-semibold mb-4">
                    Planilha 01 — Prospects
                </h2>

                <input id="prospects" type="file" accept=".csv,.xlsx" class="w-full border rounded-xl p-3 bg-white" />

            </div>

            <div class="border-2 border-dashed rounded-2xl p-6 bg-gray-50">

                <h2 class="text-xl font-semibold mb-4">
                    Planilha 02 — Vencemos
                </h2>

                <input id="contracts" type="file" accept=".csv,.xlsx" class="w-full border rounded-xl p-3 bg-white" />

            </div>

        </div>

        <button onclick="generateReport()"
            class="w-full bg-black hover:bg-gray-800 text-white py-4 rounded-2xl text-lg font-semibold transition-all">
            Gerar Relatório Consolidado
        </button>

    </div>

    <script src="script.js"></script>

</body>

</html>
